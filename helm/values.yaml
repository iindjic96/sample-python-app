replicaCount: 2

image:
  repository: iindjic96/sample-python-app
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Active service (production traffic)
service:
  active:
    name: sample-python-app-active
    type: ClusterIP
    port: 80
    targetPort: 5001
  # Preview service (new version / blue-green)
  preview:
    name: sample-python-app-preview
    type: ClusterIP
    port: 80
    targetPort: 5001

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: sample-python-app.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

rollout:
  strategy:
    blueGreen:
      autoPromotionEnabled: false
      autoPromotionSeconds: 0
      scaleDownDelaySeconds: 30
      prePromotionAnalysis: {}
      postPromotionAnalysis: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /debug
    port: 5001
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /debug
    port: 5001
  initialDelaySeconds: 5
  periodSeconds: 10

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

nodeSelector: {}

tolerations: []

affinity: {}

env: []
# - name: MY_ENV
#   value: "my-value"
